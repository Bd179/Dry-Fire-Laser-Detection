<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Dot Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay { z-index: 10; pointer-events: none; }

        #menuBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1.4rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #sidebar {
            position: fixed;
            top: 0;
            right: -380px; /* Hidden off-screen */
            width: 350px;  /* Wider sidebar */
            height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: right 0.3s ease-in-out;
            padding: 25px;
            box-sizing: border-box;
            border-left: 2px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.6rem; }
        
        #closeBtn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 2rem;
            cursor: pointer;
            padding: 0 10px;
        }
        #closeBtn:active { color: #fff; }

        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px; /* Increased spacing */
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .control-header label { font-size: 1.1rem; color: #ccc; font-weight: 500; }
        .control-value { font-size: 1.1rem; color: #0f0; font-family: monospace; font-weight: bold; }
        
        select, button.action-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 15px; /* Larger touch targets */
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        /* Custom styling for Sliders to make them easy to grab */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #444;
            border-radius: 6px;
            border: 1px solid #222;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px; /* Centers the thumb on the track */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #444;
            border-radius: 6px;
        }
        input[type="range"]::-moz-range-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
        }

        button.action-btn {
            font-weight: bold;
            background: #007bff;
            border: none;
            padding: 18px;
            margin-top: 15px;
        }
        button.action-btn:active { background: #0056b3; }
        
        #log {
            flex-grow: 1;
            margin-top: 25px;
            background: #0a0a0a;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            overflow-y: auto;
            color: #0f0;
            min-height: 120px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <button id="menuBtn">⚙️ Settings</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Controls</h2>
            <button id="closeBtn">✖</button>
        </div>

        <div class="control-group">
            <div class="control-header"><label>Target Bounds</label></div>
            <select id="targetShape">
                <option value="none">Full Screen</option>
                <option value="uspsa">USPSA Target</option>
                <option value="square">Square Target</option>
            </select>
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Target Size</label>
                <span class="control-value" id="scaleVal">200</span>
            </div>
            <input type="range" id="targetScale" min="50" max="600" value="200" oninput="document.getElementById('scaleVal').textContent = this.value">
        </div>
        <div class="control-group">
            <div class="control-header"><label>Power Factor</label></div>
            <select id="powerFactor">
                <option value="minor">Minor</option>
                <option value="major">Major</option>
            </select>
        </div>
        <div class="control-group">
            <div class="control-header"><label>Laser Color</label></div>
            <select id="laserColor">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="any">Any Bright</option>
            </select>
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Sensitivity</label>
                <span class="control-value" id="thresholdVal">255</span>
            </div>
            <input type="range" id="threshold" min="50" max="255" value="255" oninput="document.getElementById('thresholdVal').textContent = this.value">
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Cooldown (s)</label>
                <span class="control-value" id="cooldownVal">3.00</span>
            </div>
            <input type="range" id="cooldown" min="0.25" max="10" step="0.05" value="3" oninput="document.getElementById('cooldownVal').textContent = parseFloat(this.value).toFixed(2)">
        </div>
        <button id="clearBtn" class="action-btn">Clear Recorded Hits</button>

        <div id="log">System initialized. Waiting for camera...<br></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const logDiv = document.getElementById('log');
        
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => sidebar.classList.add('open'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('open'));

        const targetShapeSelect = document.getElementById('targetShape');
        const targetScaleSlider = document.getElementById('targetScale');
        const powerFactorSelect = document.getElementById('powerFactor');
        const laserColorSelect = document.getElementById('laserColor');
        const thresholdSlider = document.getElementById('threshold');
        const cooldownSlider = document.getElementById('cooldown');
        const clearBtn = document.getElementById('clearBtn');

        // USPSA point values per zone, by power factor
        const SCORING = {
            minor: { A: 5, B: 3, C: 3, D: 1 },
            major: { A: 5, B: 4, C: 4, D: 2 }
        };

        let processingCanvas = document.createElement('canvas');
        let pCtx = processingCanvas.getContext('2d');
        
        let recordedHits = [];
        let cooldownUntil = 0;
        let currentTargetPath = null;
        let currentUspsaZones = null;

        function log(message) {
            logDiv.innerHTML += `> ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                log("Camera connected successfully.");
            } catch (err) {
                log("Error accessing camera: " + err.message);
            }
        }

        video.addEventListener('loadedmetadata', () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            processingCanvas.width = video.videoWidth;
            processingCanvas.height = video.videoHeight;
            requestAnimationFrame(processFrame);
        });

        // Builds the full USPSA silhouette outline plus the A/B/C/D scoring
        // zone Path2D objects, all derived from the same geometry used by
        // drawTargetDetails() so the scoring bounds always match what's drawn.
        function getUspsaZones(cx, cy, scale) {
            const ratio = scale / 450;

            const bodyW = 450 * ratio;
            const bodyH = 600 * ratio;
            const headW = 150 * ratio;
            const headH = 150 * ratio;

            const topChamfer = 50 * ratio;
            const botChamferX1 = 75 * ratio;
            const botChamferX2 = 75 * ratio;
            const botChamferY = 150 * ratio;

            const halfW = bodyW / 2;
            const halfHeadW = headW / 2;

            const headTop = cy - ((bodyH / 2) + headH);
            const neckLine = cy - (bodyH / 2);
            const bodyBottom = cy + (bodyH / 2);

            const outline = new Path2D();
            outline.moveTo(cx - halfHeadW, headTop);
            outline.lineTo(cx + halfHeadW, headTop);
            outline.lineTo(cx + halfHeadW, neckLine);
            outline.lineTo(cx + halfW - topChamfer, neckLine);
            outline.lineTo(cx + halfW, neckLine + topChamfer);
            outline.lineTo(cx + halfW, bodyBottom - botChamferY);
            outline.lineTo(cx + halfW - botChamferX2, bodyBottom);
            outline.lineTo(cx - halfW + botChamferX1, bodyBottom);
            outline.lineTo(cx - halfW, bodyBottom - botChamferY);
            outline.lineTo(cx - halfW, neckLine + topChamfer);
            outline.lineTo(cx - halfW + topChamfer, neckLine);
            outline.lineTo(cx - halfHeadW, neckLine);
            outline.closePath();

            const u = scale / 450;

            // Head A-Zone (4x4 inches) - matches drawTargetDetails() exactly
            const headA = new Path2D();
            headA.rect(cx - 50 * u, cy - 400 * u, 100 * u, 50 * u);

            // Body A-Zone (6x11 inches)
            const bodyA = new Path2D();
            bodyA.rect(cx - 62.5 * u, cy - 250 * u, 125 * u, 275 * u);

            // Body C-Zone boundary, closed into a polygon for hit-testing
            // (the stroked version in drawTargetDetails leaves the top open
            // purely for visual style; here we close it across the top edge)
            const cZone = new Path2D();
            cZone.moveTo(cx - 80 * u, cy - 300 * u);
            cZone.lineTo(cx - 140 * u, cy - 250 * u);
            cZone.lineTo(cx - 140 * u, cy + 25 * u);
            cZone.lineTo(cx - 75 * u, cy + 150 * u);
            cZone.lineTo(cx + 75 * u, cy + 150 * u);
            cZone.lineTo(cx + 140 * u, cy + 25 * u);
            cZone.lineTo(cx + 140 * u, cy - 250 * u);
            cZone.lineTo(cx + 80 * u, cy - 300 * u);
            cZone.closePath();

            return { outline, headA, bodyA, cZone, neckLine };
        }

        // Classifies a hit (already confirmed inside the outline) into its
        // USPSA zone using the bounds returned by getUspsaZones().
        function scoreUspsaHit(x, y, zones) {
            if (ctx.isPointInPath(zones.headA, x, y)) return 'A';
            if (ctx.isPointInPath(zones.bodyA, x, y)) return 'A';
            if (y < zones.neckLine) return 'B'; // rest of the head silhouette
            if (ctx.isPointInPath(zones.cZone, x, y)) return 'C';
            return 'D'; // inside outline, outside C-zone => body D
        }

        function getTargetPath(shape, cx, cy, scale) {
            const p = new Path2D();
            
            if (shape === 'square') {
                p.rect(cx - scale/2, cy - scale/2, scale, scale);
            } else if (shape === 'uspsa') {
                const ratio = scale / 450;
                
                const bodyW = 450 * ratio;
                const bodyH = 600 * ratio;
                const headW = 150 * ratio;
                const headH = 150 * ratio;
                
                const topChamfer = 50 * ratio;
                const botChamferX1 = 75 * ratio;
                const botChamferX2 = 75 * ratio;
                const botChamferY = 150 * ratio; 
                
                const halfW = bodyW / 2;
                const halfHeadW = headW / 2;
                
                const headTop = cy - ((bodyH / 2) + headH);
                const neckLine = cy - (bodyH / 2);
                const bodyBottom = cy + (bodyH / 2);

                p.moveTo(cx - halfHeadW, headTop);
                p.lineTo(cx + halfHeadW, headTop);
                p.lineTo(cx + halfHeadW, neckLine);
                p.lineTo(cx + halfW - topChamfer, neckLine);
                p.lineTo(cx + halfW, neckLine + topChamfer);
                p.lineTo(cx + halfW, bodyBottom - botChamferY);
                p.lineTo(cx + halfW - botChamferX2, bodyBottom);
                p.lineTo(cx - halfW + botChamferX1, bodyBottom);
                p.lineTo(cx - halfW, bodyBottom - botChamferY);
                p.lineTo(cx - halfW, neckLine + topChamfer);
                p.lineTo(cx - halfW + topChamfer, neckLine);
                p.lineTo(cx - halfHeadW, neckLine);
                
                p.closePath();
            }
            return p;
        }

        function drawTargetDetails(shape, cx, cy, scale) {
            if (shape === 'square') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(cx, cy - scale/2); ctx.lineTo(cx, cy + scale/2);
                ctx.moveTo(cx - scale/2, cy); ctx.lineTo(cx + scale/2, cy);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (shape === 'uspsa') {
                const u = scale / 450;
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                
                // Head A-Zone (4x4 inches)
                ctx.strokeRect(cx - 50*u, cy - 400*u, 100*u, 50*u);
                
                // Body C-Zone Boundary
                ctx.beginPath();
                ctx.moveTo(cx - 80*u, cy - 300*u); //   
                ctx.lineTo(cx - 140*u, cy - 250*u);//   /
                ctx.lineTo(cx - 140*u, cy + 25*u);//    |
                ctx.lineTo(cx - 75*u, cy + 150*u);//     \
                ctx.lineTo(cx + 75*u, cy + 150*u);//      _
                ctx.lineTo(cx + 140*u, cy + 25*u);//       /
                ctx.lineTo(cx + 140*u, cy - 250*u);//       |
                ctx.lineTo(cx + 80*u, cy - 300*u);//        \ 
                ctx.stroke();
                
                // Body A-Zone Boundary (6x11 inches)
                ctx.strokeRect(cx - 62.5*u, cy - 250*u, 125*u, 275*u);
                
                ctx.setLineDash([]);
                
                // Draw Zone Letters
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = `bold ${25 * u}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.fillText('A', cx, cy - 372.5*u);        // Head A
                ctx.fillText('B', cx, cy - 300*u);       // Head B
                ctx.fillText('A', cx, cy - 100*u);         // Body A
                ctx.fillText('C', cx - 100*u, cy - 100*u);      // Body C
                ctx.fillText('C', cx + 100*u, cy - 100*u);      // Body C
                ctx.fillText('D', cx - 180*u, cy - 100*u);      // Body D
                ctx.fillText('D', cx + 180*u, cy - 100*u);
            }
        }

        // Shared geometry for the scoreboard box, used both to draw it and
        // to anchor the cooldown popup directly beneath it.
        function getScoreBoxRect(shape) {
            const isUspsa = shape === 'uspsa';
            const lineCount = isUspsa ? 3 : 1;
            const boxX = 15, boxY = 15, padX = 12;
            const titleH = 24, lineH = 20;
            const boxW = 215;
            const boxH = padX + titleH + lineH * (lineCount - 1) + 10;
            return { x: boxX, y: boxY, width: boxW, height: boxH, padX, titleH, lineH };
        }

        // Renders a running scoreboard in the top-left corner: total USPSA
        // points plus an A/B/C/D zone breakdown (or just a hit count for
        // non-USPSA target shapes, since zone scoring doesn't apply there).
        function drawScoreOverlay(shape) {
            const counts = { A: 0, B: 0, C: 0, D: 0 };
            let totalPoints = 0;
            recordedHits.forEach(hit => {
                if (hit.zone) counts[hit.zone]++;
                totalPoints += hit.points || 0;
            });

            const isUspsa = shape === 'uspsa';
            const lines = isUspsa
                ? [
                    `SCORE: ${totalPoints}`,
                    `A:${counts.A}  B:${counts.B}  C:${counts.C}  D:${counts.D}`,
                    `Hits: ${recordedHits.length}  (${powerFactorSelect.value.toUpperCase()})`
                  ]
                : [`Hits: ${recordedHits.length}`];

            const { x: boxX, y: boxY, width: boxW, height: boxH, padX, titleH, lineH } = getScoreBoxRect(shape);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.fillRect(boxX, boxY, boxW, boxH);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(boxX, boxY, boxW, boxH);

            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            ctx.font = 'bold 20px monospace';
            ctx.fillStyle = '#0f0';
            ctx.fillText(lines[0], boxX + padX, boxY + 10);

            ctx.font = '14px monospace';
            ctx.fillStyle = '#fff';
            for (let i = 1; i < lines.length; i++) {
                ctx.fillText(lines[i], boxX + padX, boxY + 10 + titleH + lineH * (i - 1));
            }
        }


        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const now = Date.now();
                const isDetecting = now > cooldownUntil;
                
                const cx = overlay.width / 2;
                const cy = overlay.height / 2;
                const shape = targetShapeSelect.value;
                const scale = parseInt(targetScaleSlider.value);

                ctx.clearRect(0, 0, overlay.width, overlay.height);
                currentTargetPath = shape !== 'none' ? getTargetPath(shape, cx, cy, scale) : null;
                currentUspsaZones = shape === 'uspsa' ? getUspsaZones(cx, cy, scale) : null;

                if (currentTargetPath) {
                    ctx.strokeStyle = isDetecting ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 165, 0, 0.8)';
                    ctx.lineWidth = 3;
                    ctx.stroke(currentTargetPath);
                    drawTargetDetails(shape, cx, cy, scale);
                }

                if (isDetecting) {
                    pCtx.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
                    const imgData = pCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
                    const data = imgData.data;

                    const threshold = parseInt(thresholdSlider.value);
                    const colorMode = laserColorSelect.value;

                    let highestScore = 0;
                    let targetX = -1;
                    let targetY = -1;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        let score = 0;
                        
                        if (colorMode === 'red' && r > threshold) score = r - (g + b) / 2;
                        else if (colorMode === 'green' && g > threshold) score = g - (r + b) / 2;
                        else if (colorMode === 'any') {
                            const bright = (r + g + b) / 3;
                            if (bright > threshold) score = bright;
                        }

                        if (score > highestScore) {
                            highestScore = score;
                            const pixelIndex = i / 4;
                            targetX = pixelIndex % processingCanvas.width;
                            targetY = Math.floor(pixelIndex / processingCanvas.width);
                        }
                    }

                    if (highestScore > 20) { 
                        let isValidHit = true;
                        if (currentTargetPath) {
                            isValidHit = ctx.isPointInPath(currentTargetPath, targetX, targetY);
                        }

                        if (isValidHit) {
                            let zone = null;
                            let points = 1; // generic hit value when no USPSA zones apply
                            if (shape === 'uspsa' && currentUspsaZones) {
                                zone = scoreUspsaHit(targetX, targetY, currentUspsaZones);
                                points = SCORING[powerFactorSelect.value][zone];
                            }

                            recordedHits.push({ x: targetX, y: targetY, zone, points });
                            const scoreNote = zone ? ` [${zone}-zone, +${points}]` : '';
                            const cooldownSec = parseFloat(cooldownSlider.value);
                            log(`Hit detected!${scoreNote} Paused for ${cooldownSec.toFixed(2)}s.`);
                            cooldownUntil = now + (cooldownSec * 1000);
                            
                            ctx.strokeStyle = '#00ff00';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(targetX, targetY, 5, 0, 2 * Math.PI);
                            ctx.stroke();
                        }
                    }
                } else {
                    const secondsLeft = Math.max(0, (cooldownUntil - now) / 1000).toFixed(3);

                    if (shape !== 'none') {
                        const scoreRect = getScoreBoxRect(shape);
                        const px = scoreRect.x;
                        const py = scoreRect.y + scoreRect.height + 10; // sits just under the scoreboard
                        const pw = scoreRect.width;
                        const ph = 44;

                        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        ctx.fillRect(px, py, pw, ph);
                        ctx.strokeStyle = 'rgba(255, 165, 0, 0.5)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(px, py, pw, ph);

                        ctx.fillStyle = '#ffaa00';
                        ctx.font = 'bold 18px sans-serif';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`Paused: ${secondsLeft}s`, px + 12, py + ph / 2);
                        ctx.textBaseline = 'alphabetic';
                    } else {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        ctx.fillRect(cx - 95, cy - 25, 190, 50);
                        ctx.fillStyle = '#ffaa00';
                        ctx.font = 'bold 20px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(`Paused: ${secondsLeft}s`, cx, cy + 7);
                    }
                    ctx.textAlign = 'left';
                }

                ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                recordedHits.forEach(hit => {
                    ctx.beginPath();
                    ctx.arc(hit.x, hit.y, 2, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });

                if (shape !== 'none') {
                    drawScoreOverlay(shape);
                }
            }
            requestAnimationFrame(processFrame);
        }

        clearBtn.addEventListener('click', () => {
            recordedHits = [];
            log("Cleared recorded hits.");
        });

        window.onload = initCamera;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Dot Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden; /* Prevent scrolling */
        }
        
        /* Full Screen Camera Container */
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay { z-index: 10; pointer-events: none; }

        /* Floating Menu Button */
        #menuBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Slide-out Sidebar */
        #sidebar {
            position: fixed;
            top: 0;
            right: -320px; /* Hidden off-screen by default */
            width: 280px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: right 0.3s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #sidebar.open {
            right: 0;
        }

        /* Sidebar Internals */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }
        #closeBtn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label { font-size: 0.85rem; margin-bottom: 5px; color: #bbb; }
        select, input[type="range"], button.action-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button.action-btn {
            font-weight: bold;
            background: #007bff;
            border: none;
            padding: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        button.action-btn:active { background: #0056b3; }
        
        #log {
            flex-grow: 1;
            margin-top: 15px;
            background: #0a0a0a;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            overflow-y: scroll;
            color: #0f0;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <button id="menuBtn">⚙️ Settings</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Controls</h2>
            <button id="closeBtn">✖</button>
        </div>

        <div class="control-group">
            <label>Target Bounds</label>
            <select id="targetShape">
                <option value="none">Full Screen</option>
                <option value="uspsa">USPSA Target</option>
                <option value="square">Square Target</option>
            </select>
        </div>
        <div class="control-group">
            <label>Target Size</label>
            <input type="range" id="targetScale" min="50" max="400" value="150">
        </div>
        <div class="control-group">
            <label>Laser Color</label>
            <select id="laserColor">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="any">Any Bright</option>
            </select>
        </div>
        <div class="control-group">
            <label>Sensitivity & Cooldown</label>
            <input type="range" id="threshold" min="50" max="255" value="200" title="Sensitivity">
            <input type="range" id="cooldown" min="1" max="10" value="3" title="Cooldown (Seconds)" style="margin-top: 10px;">
        </div>
        <button id="clearBtn" class="action-btn">Clear Recorded Hits</button>

        <div id="log">System initialized. Waiting for camera...<br></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const logDiv = document.getElementById('log');
        
        // Sidebar UI Logic
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => sidebar.classList.add('open'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('open'));

        // Settings Controls
        const targetShapeSelect = document.getElementById('targetShape');
        const targetScaleSlider = document.getElementById('targetScale');
        const laserColorSelect = document.getElementById('laserColor');
        const thresholdSlider = document.getElementById('threshold');
        const cooldownSlider = document.getElementById('cooldown');
        const clearBtn = document.getElementById('clearBtn');

        let processingCanvas = document.createElement('canvas');
        let pCtx = processingCanvas.getContext('2d');
        
        let recordedHits = [];
        let cooldownUntil = 0;
        let currentTargetPath = null;

        function log(message) {
            logDiv.innerHTML += `> ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                log("Camera connected successfully.");
            } catch (err) {
                log("Error accessing camera: " + err.message);
            }
        }

        video.addEventListener('loadedmetadata', () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            processingCanvas.width = video.videoWidth;
            processingCanvas.height = video.videoHeight;
            requestAnimationFrame(processFrame);
        });

        // Generates the Target Outline Path (Outer Boundary)
        function getTargetPath(shape, cx, cy, scale) {
            const p = new Path2D();
            if (shape === 'square') {
                p.rect(cx - scale, cy - scale, scale * 2, scale * 2);
            } else if (shape === 'uspsa') {
                const w = scale;
                const h = scale * 1.6;
                p.moveTo(cx - 0.18*w, cy - 0.5*h); 
                p.lineTo(cx + 0.18*w, cy - 0.5*h); 
                p.lineTo(cx + 0.18*w, cy - 0.2*h);  
                p.lineTo(cx + 0.45*w, cy - 0.1*h);  
                p.lineTo(cx + 0.45*w, cy + 0.5*h);  
                p.lineTo(cx - 0.45*w, cy + 0.5*h);  
                p.lineTo(cx - 0.45*w, cy - 0.1*h);  
                p.lineTo(cx - 0.18*w, cy - 0.2*h);  
                p.closePath();
            }
            return p;
        }

        // Draws decorative inner target lines
        function drawTargetDetails(shape, cx, cy, scale) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);

            if (shape === 'square') {
                ctx.beginPath();
                ctx.moveTo(cx, cy - scale); ctx.lineTo(cx, cy + scale);
                ctx.moveTo(cx - scale, cy); ctx.lineTo(cx + scale, cy);
                ctx.stroke();
            } else if (shape === 'uspsa') {
                const w = scale;
                const h = scale * 1.6;
                
                // C-Zone Outline
                ctx.beginPath();
                ctx.moveTo(cx - 0.12*w, cy - 0.45*h); 
                ctx.lineTo(cx + 0.12*w, cy - 0.45*h); 
                ctx.lineTo(cx + 0.12*w, cy - 0.2*h);  
                ctx.lineTo(cx + 0.35*w, cy - 0.05*h); 
                ctx.lineTo(cx + 0.35*w, cy + 0.45*h); 
                ctx.lineTo(cx - 0.35*w, cy + 0.45*h); 
                ctx.lineTo(cx - 0.35*w, cy - 0.05*h); 
                ctx.lineTo(cx - 0.12*w, cy - 0.2*h);  
                ctx.closePath();
                ctx.stroke();

                // A-Zone Body & Head
                ctx.strokeRect(cx - 0.18*w, cy - 0.05*h, 0.36*w, 0.45*h);
                ctx.strokeRect(cx - 0.08*w, cy - 0.42*h, 0.16*w, 0.15*h);
            }
            ctx.setLineDash([]);
        }

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const now = Date.now();
                const isDetecting = now > cooldownUntil;
                
                const cx = overlay.width / 2;
                const cy = overlay.height / 2;
                const shape = targetShapeSelect.value;
                const scale = parseInt(targetScaleSlider.value);

                ctx.clearRect(0, 0, overlay.width, overlay.height);
                currentTargetPath = shape !== 'none' ? getTargetPath(shape, cx, cy, scale) : null;

                if (currentTargetPath) {
                    ctx.strokeStyle = isDetecting ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 165, 0, 0.8)';
                    ctx.lineWidth = 3;
                    ctx.stroke(currentTargetPath);
                    drawTargetDetails(shape, cx, cy, scale);
                }

                if (isDetecting) {
                    pCtx.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
                    const imgData = pCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
                    const data = imgData.data;

                    const threshold = parseInt(thresholdSlider.value);
                    const colorMode = laserColorSelect.value;

                    let highestScore = 0;
                    let targetX = -1;
                    let targetY = -1;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        let score = 0;
                        
                        if (colorMode === 'red' && r > threshold) score = r - (g + b) / 2;
                        else if (colorMode === 'green' && g > threshold) score = g - (r + b) / 2;
                        else if (colorMode === 'any') {
                            const bright = (r + g + b) / 3;
                            if (bright > threshold) score = bright;
                        }

                        if (score > highestScore) {
                            highestScore = score;
                            const pixelIndex = i / 4;
                            targetX = pixelIndex % processingCanvas.width;
                            targetY = Math.floor(pixelIndex / processingCanvas.width);
                        }
                    }

                    if (highestScore > 20) { 
                        let isValidHit = true;
                        if (currentTargetPath) {
                            isValidHit = ctx.isPointInPath(currentTargetPath, targetX, targetY);
                        }

                        if (isValidHit) {
                            recordedHits.push({ x: targetX, y: targetY });
                            log(`Hit detected! Paused for ${cooldownSlider.value}s.`);
                            cooldownUntil = now + (parseInt(cooldownSlider.value) * 1000);
                            
                            ctx.strokeStyle = '#00ff00';
                            ctx.lineWidth = 4;
                            ctx.beginPath();
                            ctx.arc(targetX, targetY, 20, 0, 2 * Math.PI);
                            ctx.stroke();
                        }
                    }
                } else {
                    const secondsLeft = ((cooldownUntil - now) / 1000).toFixed(1);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(cx - 75, cy - 25, 150, 50);
                    ctx.fillStyle = '#ffaa00';
                    ctx.font = 'bold 20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Paused: ${secondsLeft}s`, cx, cy + 7);
                    ctx.textAlign = 'left';
                }

                ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                recordedHits.forEach(hit => {
                    ctx.beginPath();
                    ctx.arc(hit.x, hit.y, 8, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
            requestAnimationFrame(processFrame);
        }

        clearBtn.addEventListener('click', () => {
            recordedHits = [];
            log("Cleared recorded hits.");
        });

        window.onload = initCamera;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Dot Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay { z-index: 10; pointer-events: none; }

        #menuBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: right 0.3s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; }
        #closeBtn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .control-header label { font-size: 0.85rem; color: #bbb; }
        .control-value { font-size: 0.9rem; color: #0f0; font-family: monospace; }
        select, input[type="range"], button.action-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button.action-btn {
            font-weight: bold;
            background: #007bff;
            border: none;
            padding: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        button.action-btn:active { background: #0056b3; }
        
        #log {
            flex-grow: 1;
            margin-top: 15px;
            background: #0a0a0a;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            overflow-y: scroll;
            color: #0f0;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <button id="menuBtn">⚙️ Settings</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Controls</h2>
            <button id="closeBtn">✖</button>
        </div>

        <div class="control-group">
            <div class="control-header"><label>Target Bounds</label></div>
            <select id="targetShape">
                <option value="none">Full Screen</option>
                <option value="uspsa">USPSA Target</option>
                <option value="square">Square Target</option>
            </select>
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Target Size</label>
                <span class="control-value" id="scaleVal">200</span>
            </div>
            <input type="range" id="targetScale" min="50" max="600" value="200" oninput="document.getElementById('scaleVal').textContent = this.value">
        </div>
        <div class="control-group">
            <div class="control-header"><label>Laser Color</label></div>
            <select id="laserColor">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="any">Any Bright</option>
            </select>
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Sensitivity</label>
                <span class="control-value" id="thresholdVal">200</span>
            </div>
            <input type="range" id="threshold" min="50" max="255" value="255" oninput="document.getElementById('thresholdVal').textContent = this.value">
        </div>
        <div class="control-group">
            <div class="control-header">
                <label>Cooldown (s)</label>
                <span class="control-value" id="cooldownVal">3</span>
            </div>
            <input type="range" id="cooldown" min="1" max="10" value="3" oninput="document.getElementById('cooldownVal').textContent = this.value">
        </div>
        <button id="clearBtn" class="action-btn">Clear Recorded Hits</button>

        <div id="log">System initialized. Waiting for camera...<br></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const logDiv = document.getElementById('log');
        
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => sidebar.classList.add('open'));
        closeBtn.addEventListener('click', () => sidebar.classList.remove('open'));

        const targetShapeSelect = document.getElementById('targetShape');
        const targetScaleSlider = document.getElementById('targetScale');
        const laserColorSelect = document.getElementById('laserColor');
        const thresholdSlider = document.getElementById('threshold');
        const cooldownSlider = document.getElementById('cooldown');
        const clearBtn = document.getElementById('clearBtn');

        let processingCanvas = document.createElement('canvas');
        let pCtx = processingCanvas.getContext('2d');
        
        let recordedHits = [];
        let cooldownUntil = 0;
        let currentTargetPath = null;

        function log(message) {
            logDiv.innerHTML += `> ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                log("Camera connected successfully.");
            } catch (err) {
                log("Error accessing camera: " + err.message);
            }
        }

        video.addEventListener('loadedmetadata', () => {
            overlay.width = video.videoWidth;
            overlay.height = video.videoHeight;
            processingCanvas.width = video.videoWidth;
            processingCanvas.height = video.videoHeight;
            requestAnimationFrame(processFrame);
        });

        // Generate Target Bounds (D-Zone/Outer Edge)
        function getTargetPath(shape, cx, cy, scale) {
            const p = new Path2D();
            if (shape === 'square') {
                p.rect(cx - scale/2, cy - scale/2, scale, scale);
            } else if (shape === 'uspsa') {
                // 'scale' represents the full width at the shoulders (18 units)
                const u = scale / 18; 
                
                p.moveTo(cx - 3*u, cy - 15*u); // Head top left
                p.lineTo(cx + 3*u, cy - 15*u); // Head top right
                p.lineTo(cx + 3*u, cy - 9*u);  // Neck right
                p.lineTo(cx + 9*u, cy - 5*u);  // Shoulder right
                p.lineTo(cx + 9*u, cy + 10*u); // Body bottom right
                p.lineTo(cx + 5*u, cy + 15*u); // Base right
                p.lineTo(cx - 5*u, cy + 15*u); // Base left
                p.lineTo(cx - 9*u, cy + 10*u); // Body bottom left
                p.lineTo(cx - 9*u, cy - 5*u);  // Shoulder left
                p.lineTo(cx - 3*u, cy - 9*u);  // Neck left
                p.closePath();
            }
            return p;
        }

        // Draw C and A Zone dashed lines
        function drawTargetDetails(shape, cx, cy, scale) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);

            if (shape === 'square') {
                ctx.beginPath();
                ctx.moveTo(cx, cy - scale/2); ctx.lineTo(cx, cy + scale/2);
                ctx.moveTo(cx - scale/2, cy); ctx.lineTo(cx + scale/2, cy);
                ctx.stroke();
            } else if (shape === 'uspsa') {
                const u = scale / 18;

                // C-Zone Profile
                ctx.beginPath();
                ctx.moveTo(cx - 2*u, cy - 8*u);   // Neck L
                ctx.lineTo(cx + 2*u, cy - 8*u);   // Neck R
                ctx.lineTo(cx + 6.5*u, cy - 4.5*u); // Shoulder R
                ctx.lineTo(cx + 6.5*u, cy + 9.5*u); // Bottom R
                ctx.lineTo(cx + 4*u, cy + 12.5*u);  // Base R
                ctx.lineTo(cx - 4*u, cy + 12.5*u);  // Base L
                ctx.lineTo(cx - 6.5*u, cy + 9.5*u); // Bottom L
                ctx.lineTo(cx - 6.5*u, cy - 4.5*u); // Shoulder L
                ctx.closePath();
                ctx.stroke();

                // A-Zone Body (Rectangle)
                ctx.strokeRect(cx - 3*u, cy - 3*u, 6*u, 12*u);

                // A-Zone Head (Rectangle)
                ctx.strokeRect(cx - 1.5*u, cy - 14*u, 3*u, 4*u);
            }
            ctx.setLineDash([]);
        }

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const now = Date.now();
                const isDetecting = now > cooldownUntil;
                
                const cx = overlay.width / 2;
                const cy = overlay.height / 2;
                const shape = targetShapeSelect.value;
                const scale = parseInt(targetScaleSlider.value);

                ctx.clearRect(0, 0, overlay.width, overlay.height);
                currentTargetPath = shape !== 'none' ? getTargetPath(shape, cx, cy, scale) : null;

                if (currentTargetPath) {
                    ctx.strokeStyle = isDetecting ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 165, 0, 0.8)';
                    ctx.lineWidth = 3;
                    ctx.stroke(currentTargetPath);
                    drawTargetDetails(shape, cx, cy, scale);
                }

                if (isDetecting) {
                    pCtx.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
                    const imgData = pCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
                    const data = imgData.data;

                    const threshold = parseInt(thresholdSlider.value);
                    const colorMode = laserColorSelect.value;

                    let highestScore = 0;
                    let targetX = -1;
                    let targetY = -1;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        let score = 0;
                        
                        if (colorMode === 'red' && r > threshold) score = r - (g + b) / 2;
                        else if (colorMode === 'green' && g > threshold) score = g - (r + b) / 2;
                        else if (colorMode === 'any') {
                            const bright = (r + g + b) / 3;
                            if (bright > threshold) score = bright;
                        }

                        if (score > highestScore) {
                            highestScore = score;
                            const pixelIndex = i / 4;
                            targetX = pixelIndex % processingCanvas.width;
                            targetY = Math.floor(pixelIndex / processingCanvas.width);
                        }
                    }

                    if (highestScore > 20) { 
                        let isValidHit = true;
                        if (currentTargetPath) {
                            isValidHit = ctx.isPointInPath(currentTargetPath, targetX, targetY);
                        }

                        if (isValidHit) {
                            recordedHits.push({ x: targetX, y: targetY });
                            log(`Hit detected! Paused for ${cooldownSlider.value}s.`);
                            cooldownUntil = now + (parseInt(cooldownSlider.value) * 1000);
                            
                            ctx.strokeStyle = '#00ff00';
                            ctx.lineWidth = 4;
                            ctx.beginPath();
                            ctx.arc(targetX, targetY, 20, 0, 2 * Math.PI);
                            ctx.stroke();
                        }
                    }
                } else {
                    const secondsLeft = ((cooldownUntil - now) / 1000).toFixed(1);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(cx - 75, cy - 25, 150, 50);
                    ctx.fillStyle = '#ffaa00';
                    ctx.font = 'bold 20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`Paused: ${secondsLeft}s`, cx, cy + 7);
                    ctx.textAlign = 'left';
                }

                ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                recordedHits.forEach(hit => {
                    ctx.beginPath();
                    ctx.arc(hit.x, hit.y, 8, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
            requestAnimationFrame(processFrame);
        }

        clearBtn.addEventListener('click', () => {
            recordedHits = [];
            log("Cleared recorded hits.");
        });

        window.onload = initCamera;
    </script>
</body>
</html>
